name: loopx_crm
description: "LoopX CRM — WhatsApp CRM, Built for Growth."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Backend & networking
  supabase_flutter: ^2.8.4
  postgrest: ^2.7.4
  dio: ^5.7.0
  connectivity_plus: ^6.1.4

  # Code generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # UI components
  fl_chart: ^0.70.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  animations: ^2.0.11
  crystal_navigation_bar: ^1.1.0
  google_fonts: ^6.2.0

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.1
  flutter_dotenv: ^5.2.1
  image_picker: ^1.1.2
  share_plus: ^10.1.4
  flutter_local_notifications: ^18.0.1
  getwidget: any
  flutter_floating_bottom_bar: ^2.0.2
  
  # Firebase push
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4

  # Device info
  device_info_plus: ^11.3.3
  package_info_plus: ^8.1.3

  # Splash screen
  flutter_native_splash: ^2.4.4

  # Material
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generators
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.3
  analyzer: ^7.3.0

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
